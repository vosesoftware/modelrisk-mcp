# ModelRisk audit rule set.
#
# Each rule has a Python detector in `modelrisk_mcp.audit.rules`. The
# YAML controls which rules run, their severity, and the message the
# audit report shows. Set `enabled: false` to disable a rule without
# touching code.
#
# Severities:
#   error   — almost certainly wrong; should be fixed before running
#   warning — methodology concern; the model will run but the result
#             may be misleading
#   info    — observation worth flagging

rules:
  - id: VOSE-001
    name: unknown_vose_function
    severity: error
    enabled: true
    description: >
      A cell uses a function name that starts with `Vose` but isn't in
      the ModelRisk catalogue. This is almost always a typo introduced
      by an LLM or hand-edit.
    suggested_fix_template: >
      Verify the function name. The MCP catalogue has {catalogue_size}
      Vose functions; this cell uses {function_name!r} which isn't one
      of them.

  - id: VOSE-002
    name: distribution_without_input_wrapper
    severity: warning
    enabled: true
    description: >
      A cell contains a Vose distribution function but isn't wrapped
      with VoseInput. The Results Viewer won't track this cell's
      samples; it won't appear in the inputs list or in
      correlation/tornado outputs.
    suggested_fix_template: >
      Wrap the cell with VoseInput("name") via the wrap_with_input
      tool, OR confirm this distribution is genuinely just an
      intermediate (e.g. a copula u-array) and the warning can be
      ignored.

  - id: VOSE-003
    name: fit_without_uncertainty
    severity: warning
    enabled: true
    description: >
      A Vose*Fit(...) call doesn't pass uncertainty=TRUE. Fitting a
      distribution without parameter uncertainty understates the real
      uncertainty in the system — the simulation samples only from
      the best-fit parameters as if they were certain.
    suggested_fix_template: >
      Add uncertainty=TRUE to the fit call. If the LLM built this with
      the fit_distribution_to_data tool, re-run with uncertainty=True.

  - id: VOSE-004
    name: output_cell_no_distribution_reference
    severity: info
    enabled: true
    description: >
      A VoseOutput cell's formula doesn't reference any VoseInput cells
      directly or transitively. The output will be deterministic across
      iterations — likely not what the user intended.
    suggested_fix_template: >
      Check that the output cell does in fact depend on a random input.
      If it doesn't, either delete the VoseOutput wrapper or wire the
      cell to a distribution.

  - id: VOSE-005
    name: arithmetic_before_input_wrapper
    severity: warning
    enabled: true
    description: >
      A cell's formula has arithmetic (e.g. `=2*VoseNormal(0,1)`)
      without a VoseInput wrapper. The cell still varies but is hidden
      from the Results Viewer. Wrap it as an input if it represents a
      real model input.
    suggested_fix_template: >
      Either wrap with VoseInput, or refactor: move the distribution
      into one cell (with the wrapper) and the arithmetic into a
      downstream cell.

  - id: VOSE-006
    name: hard_coded_inputs_present
    severity: info
    enabled: true
    description: >
      Plain numeric cells that look like model inputs (round numbers
      referenced by formula cells). These are candidates for replacement
      with a distribution + VoseInput wrapper.
    suggested_fix_template: >
      Use propose_distributions_for_inputs to get distribution
      suggestions, then replace_constant_with_distribution to commit
      one at a time.

  - id: VOSE-007
    name: risk_event_degenerate_probability
    severity: warning
    enabled: true
    description: >
      A VoseRiskEvent(probability, ...) has a literal probability of 0
      or 1. p=0 means the event never fires (the wrapper just returns
      zero — delete it); p=1 means the event always fires (the impact
      is the impact distribution, no need for the bimodal wrapper).
    suggested_fix_template: >
      For p=0: delete the VoseRiskEvent wrapper; the result is always
      zero. For p=1: replace with the impact distribution directly. For
      genuinely-uncertain p, use a Beta(alpha, beta) input instead of a
      literal.

  - id: VOSE-008
    name: voseoutput_missing_name
    severity: error
    enabled: true
    description: >
      A cell uses VoseOutput() with no name argument, or an empty
      string. ModelRisk identifies outputs in the Results Viewer by
      name; unnamed outputs are nearly impossible to reference later
      and break get_simulation_results / get_sensitivity_ranking
      by-name lookups.
    suggested_fix_template: >
      Give the output a meaningful name: VoseOutput("Total Cost"). Use
      wrap_with_output(name=...) to do this safely from an MCP tool.

  - id: VOSE-009
    name: duplicate_output_names
    severity: error
    enabled: true
    description: >
      Two or more cells declare a VoseOutput with the same name. The
      Results Viewer shows conflicting entries, and the by-name result
      lookups (get_simulation_results) become ambiguous.
    suggested_fix_template: >
      Rename one of the duplicate outputs (e.g. add a sheet prefix or a
      year suffix). Use wrap_with_output to rename cleanly.

  - id: VOSE-010
    name: input_wrapper_without_distribution
    severity: warning
    enabled: true
    description: >
      A cell wrapped with VoseInput("...") has no Vose distribution
      function in its formula. The input is registered with the Results
      Viewer but won't vary across iterations — its samples will all be
      identical.
    suggested_fix_template: >
      Either wire the cell to a distribution (replace the constant with
      VoseNormal / VoseLognormal / etc. as appropriate) or remove the
      VoseInput wrapper.

  - id: VOSE-013
    name: arg_count_mismatch
    severity: error
    enabled: true
    description: >
      A Vose function call has fewer arguments than the catalogue
      declares as required, or more than the catalogue declares at
      all. Common LLM failure mode: hallucinating `VosePERT(min, max)`
      (missing mode), `VoseLognormal(mean)` (missing stdev), or
      `VoseTriangle(min, max)` (missing mode). The cell will return
      `#VALUE!` or `#NUM!` at calculation time, but the formula is
      otherwise well-formed so VOSE-001 won't catch it.
    suggested_fix_template: >
      Check the function's signature in the catalogue. `{function_name}`
      expects {min_args}-{max_args} args; this call has {actual_args}.
      Required params: {required_params}.

  - id: VOSE-012
    name: cell_evaluates_to_error
    severity: error
    enabled: true
    description: >
      A cell evaluates to an Excel error (`#DIV/0!`, `#REF!`, `#NAME?`,
      `#VALUE!`, etc.). The simulation will sample broken values from
      this cell on every iteration. If the cell contains a ModelRisk
      distribution or wrapper call, the error propagates into the
      Results Viewer and the run is unusable.
    suggested_fix_template: >
      Trace the cell's formula back to the broken reference and fix it.
      For `#REF!` errors, restore the deleted cell or rewrite the
      formula. For `#DIV/0!`, guard with `IFERROR(..., 0)` or
      conditional logic. For `#NAME?`, check whether a function name
      (often ModelRisk's `VoseXxx`) was misspelled.

  - id: VOSE-011
    name: high_volatility_normal_positive_mean
    severity: warning
    enabled: true
    description: >
      A VoseNormal(mu, sigma) call has mu > 0 and sigma > mu / 2.
      Roughly 16% of samples will be negative — usually wrong for
      quantities like price, demand, or duration that can't be negative.
      Lognormal, gamma, or Weibull are more appropriate for
      positive-only quantities with substantial variability.
    suggested_fix_template: >
      Consider VoseLognormal(mu, sigma) (matches mean and stdev, always
      positive) or VoseGamma. If negatives ARE genuinely possible
      (returns, deltas), use VoseNormalT to truncate at zero.

  # ----------------------------------------------------------------------
  # Spreadsheet-integrity rules (SS-*) — general spreadsheet hygiene,
  # distinct from the VOSE-* Monte-Carlo-methodology rules above. Drawn
  # from the established spreadsheet-error / model-control discipline
  # (O'Beirne, "Spreadsheet Check and Control"; Rees, "Principles of
  # Financial Modelling"; the EuSpRIG literature).
  # ----------------------------------------------------------------------

  - id: SS-001
    name: magic_number_in_formula
    severity: info
    enabled: true
    description: >
      A (non-Vose) formula buries a parameter-like constant — a decimal
      literal such as 1.21 or 0.85 — alongside cell references. Inputs
      should live in their own labelled cells, not be hard-coded inside
      formulas, so they are visible, auditable, and changeable in one
      place. A tax rate or growth factor hidden in `=Revenue*1.21` is
      invisible to a reviewer and easy to get wrong.
    suggested_fix_template: >
      Move the constant {literal} into its own labelled input cell and
      reference that cell from the formula. This makes the assumption
      visible and lets it be changed (or made uncertain with VoseInput)
      in one place.

  - id: SS-002
    name: number_stored_as_text
    severity: warning
    enabled: true
    description: >
      A numeric-looking value is stored as TEXT in a cell that a formula
      references. Text numbers are silently skipped by SUM and
      arithmetic, producing wrong totals with no error shown — one of
      the most common and dangerous spreadsheet faults.
    suggested_fix_template: >
      Convert the cell to a real number (e.g. retype it, multiply by 1,
      or use VALUE()). Then confirm any totals that reference it update.

  - id: SS-003
    name: overly_complex_formula
    severity: info
    enabled: true
    description: >
      A single (non-Vose) formula does too much — many operators or a
      very long expression. Dense formulas are the hardest cells to
      review and the easiest to get subtly wrong; best practice is to
      break a calculation into one clear step per cell.
    suggested_fix_template: >
      Split the formula into intermediate cells, one calculation step
      each, with labels. The model becomes far easier to audit and to
      trace when a result looks wrong.

  - id: SS-004
    name: inconsistent_formula_in_block
    severity: warning
    enabled: true
    description: >
      A cell in the middle of a filled run of formulas has a different
      pattern from the cells on both sides of it, when those neighbours
      agree with each other. This is the classic and most dangerous
      spreadsheet error: a row or column was filled correctly, then one
      interior cell was overtyped or edited, silently breaking the
      pattern and corrupting every downstream result.
    suggested_fix_template: >
      Compare this cell's formula with its neighbours in the run. If it
      was meant to follow the same pattern, re-fill it from a correct
      neighbour. If the difference is intentional, consider a layout or
      comment that makes the exception obvious to the next reader.
